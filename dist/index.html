<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BN Square Agent</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260630-5" />
  </head>
  <body>
    <div class="app-frame">
      <aside class="sidebar">
        <div class="brand">
          <strong>BN Agent</strong>
          <span>运营控制台</span>
        </div>
        <nav class="side-nav" aria-label="主导航">
          <button class="nav-item active" type="button" data-page-target="dashboard">自动运行</button>
          <button class="nav-item" type="button" data-page-target="accounts">账号管理</button>
          <button class="nav-item" type="button" data-page-target="sources">素材中心</button>
          <div class="side-submenu" aria-label="素材中心分类">
            <button class="sub-nav-item" type="button" data-source-target="sources" data-source-type="techflow_newsletter">深潮源配置</button>
            <button class="sub-nav-item" type="button" data-source-target="items" data-source-type="techflow_newsletter">深潮素材库</button>
            <button class="sub-nav-item active" type="button" data-source-target="sources" data-source-type="binance_square">BN 广场源配置</button>
            <button class="sub-nav-item" type="button" data-source-target="items" data-source-type="binance_square">BN 广场素材库</button>
          </div>
          <button class="nav-item" type="button" data-page-target="settings">系统设置</button>
          <div class="side-submenu" aria-label="系统设置分类">
            <button class="sub-nav-item active" type="button" data-settings-target="llm">大模型设置</button>
            <button class="sub-nav-item" type="button" data-settings-target="alerts">邮箱预警设置</button>
            <button class="sub-nav-item" type="button" data-settings-target="runtime">自动运行设置</button>
          </div>
        </nav>
      </aside>

      <main class="shell">
        <section class="topbar">
          <div>
            <h1>BN Square Agent</h1>
            <p>多账号采集、改写、配图、发布自动运营台</p>
          </div>
          <div class="topbar-meta">
            <span>远程 MCP</span>
            <strong>qianxin.xyz</strong>
          </div>
        </section>

        <section class="panel runner page active" data-page="dashboard">
          <header>
            <h2>自动运行</h2>
            <div class="header-actions">
              <button id="toggleMonitor" type="button">启动自动运行</button>
              <button id="runMonitorNow" type="button">立即运行</button>
              <button id="checkTools" type="button">检查 MCP</button>
            </div>
          </header>

          <div class="auto-summary">
            <div>
              <strong id="autoRunState">加载中</strong>
              <span>后台服务</span>
            </div>
            <div>
              <strong id="autoRunInterval">-</strong>
              <span>运行节奏</span>
            </div>
            <div>
              <strong id="autoRunConsume">-</strong>
              <span>自动消费</span>
            </div>
            <div>
              <strong id="autoRunStage">-</strong>
              <span>当前阶段</span>
            </div>
            <div>
              <strong id="autoRunNext">-</strong>
              <span>下一轮</span>
            </div>
            <div>
              <strong id="autoRunLast">-</strong>
              <span>最近结果</span>
            </div>
          </div>

          <pre id="output" class="output">等待自动运行日志...</pre>
        </section>

        <section class="panel accounts page" data-page="accounts">
          <header>
            <h2>账号管理</h2>
            <button id="refreshAccounts" type="button">刷新</button>
          </header>

          <form id="accountForm" class="stack">
            <label>
              <span>账号标识</span>
              <input name="key" placeholder="acc_1" required />
            </label>
            <label>
              <span>显示名称</span>
              <input name="name" placeholder="账号 1" />
            </label>
            <label>
              <span>Binance Cookie</span>
              <textarea name="cookie" rows="8" placeholder="粘贴浏览器 Cookie" required></textarea>
            </label>
            <button type="submit">保存账号</button>
          </form>

          <div id="accountsList" class="list"></div>
        </section>

        <section class="panel sources page" data-page="sources">
          <header data-source-section="sources">
            <h2>素材源</h2>
            <button id="checkSources" type="button">立即采集</button>
          </header>

          <form id="sourceForm" class="stack">
            <label class="source-type-row">
              <span>来源类型</span>
              <select name="source_type">
                <option value="binance_square">BN 广场作者</option>
                <option value="techflow_newsletter">TechFlow 深潮快讯</option>
              </select>
            </label>
            <label class="bn-source-field">
              <span>来源名称</span>
              <input name="name" placeholder="目标作者 / 频道名" required />
            </label>
            <label class="bn-source-field">
              <span>素材链接</span>
              <input name="url" placeholder="BN 作者主页或 TechFlow 快讯链接" required />
            </label>
            <p class="techflow-source-note">深潮快讯使用固定官方快讯源，无需填写名称和链接。</p>
            <button type="submit">保存素材源</button>
          </form>

          <div id="sourcesList" class="list"></div>

          <pre id="monitorStatus" class="status-box">监控状态加载中...</pre>

          <header class="subhead" data-source-section="items">
            <h2>素材库</h2>
            <button id="refreshItems" type="button">刷新</button>
          </header>
          <div id="itemsList" class="list material-list"></div>
        </section>

        <section class="panel settings-panel page" data-page="settings">
          <header>
            <h2>系统设置</h2>
            <div class="header-actions">
              <button id="testLlm" type="button">测试 LLM</button>
              <button id="testEmbedding" type="button">测试 Embedding</button>
              <button id="refreshSettings" type="button">刷新</button>
            </div>
          </header>

          <form id="settingsForm" class="stack compact-form">
            <fieldset class="settings-group active" data-settings-group="llm">
              <legend>大模型设置</legend>
              <label class="wide">
                <span>LLM API Key</span>
                <input name="llm_api_key" placeholder="已保存时显示加密掩码；输入新 key 可覆盖" />
                <small id="llmApiKeyHint" class="field-hint">未加载</small>
              </label>
              <label>
                <span>LLM Base URL</span>
                <input name="llm_base_url" placeholder="https://..." />
              </label>
              <label>
                <span>LLM Model</span>
                <input name="llm_model" list="llmModelOptions" placeholder="选择或输入模型名" />
                <datalist id="llmModelOptions"></datalist>
              </label>
              <div class="model-picker wide">
                <button id="fetchLlmModels" type="button">获取模型</button>
                <select id="llmModelSelect">
                  <option value="">填好 URL 和 Key 后获取模型</option>
                </select>
              </div>
              <small id="llmModelsStatus" class="field-hint wide">填好 URL 和 Key 后点击获取模型</small>
              <label>
                <span>DashScope API Key</span>
                <input name="dashscope_api_key" placeholder="已保存时显示加密掩码；输入新 key 可覆盖" />
                <small id="dashscopeApiKeyHint" class="field-hint">未加载</small>
              </label>
              <label>
                <span>Embedding Model</span>
                <input name="dashscope_embedding_model" placeholder="text-embedding-v3" />
              </label>
            </fieldset>

            <fieldset class="settings-group" data-settings-group="alerts">
              <legend>邮箱预警设置</legend>
              <label class="check wide">
                <input name="alert_email_enabled" type="checkbox" />
                <span>邮件提醒</span>
              </label>
              <label>
                <span>连续失败提醒阈值</span>
                <input name="publish_failure_alert_threshold" type="number" min="1" step="1" />
              </label>
              <label>
                <span>提醒邮箱</span>
                <input name="alert_email_to" placeholder="收到告警的邮箱" />
              </label>
              <label>
                <span>SMTP Host</span>
                <input name="smtp_host" placeholder="smtp.example.com" />
              </label>
              <label>
                <span>SMTP Port</span>
                <input name="smtp_port" type="number" min="1" step="1" />
              </label>
              <label>
                <span>SMTP 用户名</span>
                <input name="smtp_username" placeholder="发件账号" />
              </label>
              <label>
                <span>SMTP 密码</span>
                <input name="smtp_password" placeholder="已保存时显示加密掩码；输入新密码可覆盖" />
              </label>
              <label>
                <span>发件邮箱</span>
                <input name="smtp_from" placeholder="默认使用 SMTP 用户名" />
              </label>
              <label class="check">
                <input name="smtp_use_tls" type="checkbox" />
                <span>SMTP TLS</span>
              </label>
            </fieldset>

            <fieldset class="settings-group" data-settings-group="runtime">
              <legend>自动运行设置</legend>
              <label class="check">
                <input name="auto_monitor_enabled" type="checkbox" />
                <span>自动循环</span>
              </label>
              <label class="check">
                <input name="auto_publish" type="checkbox" />
                <span>自动发布</span>
              </label>
              <label class="check">
                <input name="auto_consume_materials" type="checkbox" />
                <span>自动消费素材</span>
              </label>
              <label>
                <span>采集间隔 秒</span>
                <input name="material_poll_interval_seconds" type="number" min="30" step="1" />
              </label>
              <label>
                <span>成功后间隔 秒</span>
                <input name="material_success_interval_seconds" type="number" min="60" step="1" />
              </label>
              <label>
                <span>失败后重试 秒</span>
                <input name="material_failure_interval_seconds" type="number" min="30" step="1" />
              </label>
              <label>
                <span>素材有效期 秒</span>
                <input name="material_ttl_seconds" type="number" min="60" step="1" />
              </label>
              <label>
                <span>每轮消费数量</span>
                <input name="material_consume_batch_size" type="number" min="1" step="1" />
              </label>
            </fieldset>
            <button type="submit">保存配置</button>
          </form>

          <pre id="settingsStatus" class="status-box">配置加载中...</pre>
        </section>
      </main>
    </div>

    <script src="/static/app.js?v=20260701-3"></script>
  </body>
</html>
